<div class="card flex-fill">
  <div class="card-body">
    <h3 class="h6 mb-3">Scorecard – Matrice détaillée des activités</h3>

    <div class="table-responsive scorecard-table-wrap">
      <table class="table table-bordered table-sm activity-matrix-detail scorecard-table text-center align-middle mb-0">
        <thead>
          <tr>
            <th class="text-start activity-header-col">Activités</th>
            <th *ngFor="let phase of getPhases()">
              {{ getPhaseLabel(phase) }}
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let activity of getActivities()" class="activity-row">
            <!-- 1ère colonne : thématique + responsable -->
            <td class="text-start activity-cell">
              <div class="activity-name">{{ activity.label }}</div>
              <div class="activity-owner text-muted">
                Responsable : <strong>{{ activity.owner }}</strong>
              </div>
            </td>

            <!-- Cellules : tâches (1 à 4) sous forme de cartouches -->
            <td *ngFor="let phase of getPhases()" class="phase-cell">
              <div class="cell-tasks">
                <div
                  *ngFor="let task of getTasks(activity.id, phase)"
                  class="task-pill"
                  [ngClass]="getStatusClass(task.status)"
                  (click)="openTaskEditModal(taskEditModal, activity.id, phase, task)">
                  {{ task.label }}
                </div>

                <div *ngIf="getTasks(activity.id, phase).length === 0" class="no-task text-muted small">
                  -
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<!-- Modal d'édition -->
<ng-template #taskEditModal let-modal>
  <app-project-task-edit-modal
    [editError]="editError"
    [(editedTaskLabel)]="editedTaskLabel"
    [(editedTaskStatus)]="editedTaskStatus"
    [(editedStartDate)]="editedStartDate"
    [(editedEndDate)]="editedEndDate"
    [(editedCategory)]="editedCategory"
    [(editedPhase)]="editedPhase"
    [(editedReporterId)]="editedReporterId"
    [(editedAccountantId)]="editedAccountantId"
    [(editedResponsibleId)]="editedResponsibleId"
    [taskStatusOptions]="taskStatusOptions"
    [taskCategoryOptions]="taskCategoryOptions"
    [dependencyTypeOptions]="dependencyTypeOptions"
    [phases]="getPhases()"
    [users]="users"
    [editedDependencies]="editedDependencies"
    [linkableTasks]="getLinkableTasks()"
    (addDependency)="addDependencyRow()"
    (removeDependency)="removeDependencyRow($event)"
    (cancel)="modal.dismiss()"
    (save)="saveTaskEdit(modal)"
  ></app-project-task-edit-modal>
</ng-template>
