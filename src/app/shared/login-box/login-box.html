<div class="card shadow-sm">
  <div class="card-body">
    <h5 class="card-title mb-3">Connexion</h5>

    <form (ngSubmit)="onSubmit()" autocomplete="off">
      <div class="mb-3">
        <label for="username" class="form-label">Nom d'utilisateur</label>
        <input id="username"
               class="form-control"
               type="text"
               [(ngModel)]="model.username"
               name="username"
               autocomplete="off"
               autocapitalize="off"
               autocorrect="off"
               spellcheck="false"
               [disabled]="loading"
               required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Mot de passe</label>
        <div class="password-field">
          <input id="password"
                 class="form-control"
                 [type]="showPassword ? 'text' : 'password'"
                 [(ngModel)]="model.password"
                 name="password"
                 autocomplete="current-password"
                 [disabled]="loading"
                 required>
          <button
            type="button"
            class="password-toggle"
            [attr.aria-label]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
            [attr.title]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
            [disabled]="loading"
            (click)="togglePasswordVisibility()">
            {{ showPassword ? 'Masquer' : 'Afficher' }}
          </button>
        </div>
      </div>

      <div class="form-check mb-3">
        <input
          id="remember"
          class="form-check-input"
          type="checkbox"
          [(ngModel)]="model.remember"
          name="remember"
          [disabled]="loading">
        <label class="form-check-label" for="remember">Rester connecté</label>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger py-2 mb-3" role="alert">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>
  </div>
</div>
