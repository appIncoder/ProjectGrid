<div class="project-page-container">

  <!-- États -->
  <div *ngIf="isLoading" class="text-muted small mb-2">
    Chargement du projet…
  </div>

  <div *ngIf="loadError" class="alert alert-danger py-2 small mb-2 d-flex align-items-center justify-content-between">
    <span>{{ loadError }}</span>
    <button class="btn btn-sm btn-outline-light" type="button" (click)="reload()" [disabled]="isLoading">
      ↻ Réessayer
    </button>
  </div>

  <div *ngIf="isSaving" class="text-muted small mb-2">
    Enregistrement des modifications…
  </div>

  <div *ngIf="saveError" class="alert alert-warning py-2 small mb-2">
    {{ saveError }}
  </div>

  <!-- ✅ Contenu seulement si project existe -->
  <ng-container *ngIf="project as p">

    <div class="project-page-shell">
      <!-- Header du projet -->
      <div class="project-header card mb-3">
        <div class="card-body">
          <div class="project-header-top">
            <h2 class="h5 mb-0">{{ p.name }}</h2>
            <div class="project-header-right">
              <span class="current-phase-badge" *ngIf="currentPhaseName">
                Phase en cours&nbsp;: <strong>{{ currentPhaseName }}</strong>
              </span>
              <span class="project-meta-item d-inline-flex align-items-center gap-2">
                <label for="project-health-select" class="mb-0">Santé:</label>
                <select
                  id="project-health-select"
                  class="form-select form-select-sm project-health-select"
                  style="min-width: 180px;"
                  [ngModel]="selectedHealthShortName"
                  (ngModelChange)="onProjectHealthChange($event)"
                  [disabled]="isUpdatingHealth || isSaving"
                >
                  <option *ngFor="let h of healthDefaults" [ngValue]="h.shortName">
                    {{ h.shortName }} - {{ h.longName }}
                  </option>
                </select>
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- Onglets -->
      <div class="project-tabs-wrap mb-3">
        <ul class="nav nav-tabs project-tabs">
          <li class="nav-item">
            <button class="nav-link" [class.active]="activeTab === 'scorecard'" type="button" (click)="setTab('scorecard')">
              Scorecard
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link" [class.active]="activeTab === 'risks'" type="button" (click)="setTab('risks')">
              Gestion des risques
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link" [class.active]="activeTab === 'budget'" type="button" (click)="setTab('budget')">
              Gestion du budget
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link" [class.active]="activeTab === 'roadmap'" type="button" (click)="setTab('roadmap')">
              Roadmap
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link" [class.active]="activeTab === 'board'" type="button" (click)="setTab('board')">
              Board
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link" [class.active]="activeTab === 'ressources'" type="button" (click)="setTab('ressources')">
              Ressources
            </button>
          </li>
          <li class="nav-item ms-auto detailed-tab-group">
            <span class="detailed-tab-group-title">Gestion détaillée</span>
            <div class="detailed-tab-buttons">
              <button class="nav-link detailed-tab-button" [class.active]="activeTab === 'detail_project'" type="button" (click)="setTab('detail_project')">
                Projet
              </button>
              <button class="nav-link detailed-tab-button" [class.active]="activeTab === 'detail_business'" type="button" (click)="setTab('detail_business')">
                Métier
              </button>
              <button class="nav-link detailed-tab-button" [class.active]="activeTab === 'change'" type="button" (click)="setTab('change')">
                Changement
              </button>
              <button class="nav-link detailed-tab-button" [class.active]="activeTab === 'detail_technology'" type="button" (click)="setTab('detail_technology')">
                Technologie
              </button>
            </div>
          </li>
        </ul>
      </div>

      <div class="project-tab-panel">
        <!-- Onglet 1 : Scorecard -->
        <app-project-score-card *ngIf="activeTab === 'scorecard'" [project]="p" [users]="users"></app-project-score-card>

        <!-- Onglet 2 : Gestion des risques -->
        <div [hidden]="activeTab !== 'risks'">
          <app-project-risks [projectId]="p.id" [project]="p"></app-project-risks>
        </div>

        <!-- Onglet 3 : Conduite du changement (ADKAR) -->
        <div [hidden]="activeTab !== 'detail_project'">
          <app-project-project-management [project]="p" [users]="users"></app-project-project-management>
        </div>

        <div [hidden]="activeTab !== 'detail_business'">
          <app-project-business-management [project]="p" [users]="users"></app-project-business-management>
        </div>

        <div [hidden]="activeTab !== 'change'">
          <app-project-change-management [project]="p" [users]="users"></app-project-change-management>
        </div>

        <div [hidden]="activeTab !== 'detail_technology'">
          <app-project-technology-management [project]="p" [users]="users"></app-project-technology-management>
        </div>

        <!-- Onglet 4 : Gestion du budget -->
        <app-project-budget *ngIf="activeTab === 'budget'"></app-project-budget>

        <!-- Onglet 5 : Roadmap / Gantt -->
        <app-project-roadmap
          *ngIf="activeTab === 'roadmap'"
          [project]="p"
          [users]="users"
          [isSaving]="isSaving"
          [saveError]="saveError"
        ></app-project-roadmap>

        <!-- Onglet 6 : Board -->
        <app-project-board *ngIf="activeTab === 'board'" [project]="p" [users]="users"></app-project-board>

        <!-- Onglet 7 : Ressources -->
        <app-project-ressources *ngIf="activeTab === 'ressources'" [project]="p"></app-project-ressources>
      </div>
    </div>

  </ng-container>

  <!-- ✅ Si pas loading + pas d'erreur + pas de projet -->
  <div *ngIf="!isLoading && !loadError && !project" class="text-muted small">
    Aucun projet à afficher.
  </div>
</div>
